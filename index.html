<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NFC Safety Demo Cloud Table</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="overlay"></div>

  <div id="homeScreen" class="home-screen">
    <div class="lang-switch">
      <button class="flag-btn flag-btn-he" data-lang="he" onclick="setLang('he')" aria-label="עברית">
        <span class="flag-mark" aria-hidden="true"></span>
        <span class="flag-label">עבר</span>
      </button>
      <button class="flag-btn flag-btn-en" data-lang="en" onclick="setLang('en')" aria-label="English">
        <span class="flag-mark" aria-hidden="true"></span>
        <span class="flag-label">EN</span>
      </button>
      <button class="flag-btn flag-btn-ar" data-lang="ar" onclick="setLang('ar')" aria-label="العربية">
        <span class="flag-mark" aria-hidden="true"></span>
        <span class="flag-label">عرب</span>
      </button>
    </div>

    <div class="actions">
      <button class="btn btn-check" onclick="openScreen('scanScreen')">
        <span class="btn-inner"><span id="homeCheckText"></span><span class="icon">&#x1F50D;</span></span>
      </button>
      <button class="btn btn-register" onclick="openPasswordScreen()">
        <span class="btn-inner"><span id="homeRegisterText"></span><span class="icon">&#x270E;</span></span>
      </button>
    </div>

    <div class="demo-badge-bottom">DEMO</div>
  </div>

  <div id="passwordScreen" class="screen">
    <div class="card topbar">
      <button class="back-btn" onclick="goHome()" id="passwordBackBtn"></button>
      <h2 id="passwordTitle"></h2>
    </div>
    <div class="card">
      <label for="passwordInput" id="passwordLabel"></label>
      <input id="passwordInput" type="password">
      <button class="password-btn" onclick="checkPassword()" id="passwordEnterBtn"></button>
      <div id="passwordStatus" class="status error-text"></div>
    </div>
  </div>

  <div id="scanScreen" class="screen">
    <div class="card topbar">
      <button class="back-btn" onclick="goHome()" id="scanBackBtn"></button>
      <h2 id="scanScreenTitle"></h2>
    </div>
    <div class="card">
      <button class="main-action" onclick="startScan('scan')" id="scanNowBtn"></button>
      <button class="secondary-btn" onclick="demoScan()" id="demoScanBtn"></button>
      <div id="scanStatus" class="status muted"></div>

      <div id="scanResult" class="result-card">
        <div class="result-grid">
          <div class="thumb"><img id="scanItemImage" src="" alt="Item image"></div>
          <div>
            <h3 id="scanItemType"></h3>
            <div><span id="lblTagId"></span>: <span id="scanTagId" class="mono"></span></div>
            <div><span id="lblDescription"></span>: <span id="scanDescription"></span></div>
            <div><span id="lblSerial"></span>: <span id="scanSerial"></span></div>
            <div><span id="lblWll"></span>: <span id="scanWll"></span></div>
            <div><span id="lblNextInspection"></span>: <span id="scanNextInspection"></span></div>
            <div><span id="lblStatus"></span>: <span id="scanItemStatus"></span></div>
            <div><span id="lblNotes"></span>: <span id="scanNotes"></span></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="registerScreen" class="screen">
    <div class="card topbar">
      <button class="back-btn" onclick="goHome()" id="registerBackBtn"></button>
      <h2 id="registerScreenTitle"></h2>
    </div>

    <div class="card">
      <div class="tabs">
        <button class="tab-btn active" id="tabRegisterBtn" onclick="openRegisterTab('registerPane')"></button>
        <button class="tab-btn" id="tabTableBtn" onclick="openRegisterTab('tablePane'); renderItemsTable()"></button>
        <button class="tab-btn" id="tabLogsBtn" onclick="openRegisterTab('logsPane'); renderScanLogs()"></button>
      </div>

      <div id="registerPane" class="tab-pane active">
        <button class="main-action" onclick="startScan('register')" id="scanNewTagBtn"></button>
        <div id="registerStatus" class="status muted"></div>

        <div class="row">
          <div>
            <label for="tagId" id="tagIdLabel"></label>
            <input id="tagId">
          </div>
          <div>
            <div class="preview-wrap">
              <div style="flex:1;">
                <label for="itemType" id="itemTypeLabel"></label>
                <select id="itemType"></select>
              </div>
              <div>
                <label id="imageLabel"></label>
                <div class="preview-box"><img id="selectedImagePreview" src="" alt="Preview"></div>
              </div>
            </div>
          </div>
        </div>

        <div class="row">
          <div>
            <label for="description" id="descriptionLabel"></label>
            <input id="description">
          </div>
          <div>
            <label for="serialNumber" id="serialLabel"></label>
            <input id="serialNumber">
          </div>
        </div>

        <div class="row">
          <div>
            <label for="wll" id="wllLabel"></label>
            <input id="wll">
          </div>
          <div>
            <label for="nextInspection" id="nextInspectionLabel"></label>
            <input id="nextInspection" type="date">
          </div>
        </div>

        <div class="row">
          <div>
            <label for="itemStatus" id="itemStatusLabel"></label>
            <select id="itemStatus"></select>
          </div>
          <div>
            <label for="notes" id="notesLabel"></label>
            <input id="notes">
          </div>
        </div>

        <button class="save-btn" onclick="saveItem()" id="saveBtn"></button>
        <button class="secondary-btn" onclick="clearForm()" id="clearFormBtn"></button>
        <div id="saveStatus" class="status muted"></div>
      </div>

      <div id="tablePane" class="tab-pane">
        <div class="table-toolbar">
          <div id="tableTitleText" style="font-weight:700;"></div>
          <div class="table-summary" id="tableSummaryText"></div>
        </div>
        <div class="table-toolbar">
          <div class="table-filters">
            <input id="tableSearchInput" class="toolbar-input" type="search">
            <select id="tableStatusFilter" class="toolbar-input"></select>
            <button class="mini-btn" onclick="clearTableFilters()" id="clearTableFiltersBtn"></button>
          </div>
          <button class="mini-btn" onclick="renderItemsTable()" id="refreshTableBtn"></button>
        </div>
        <div id="itemsTableContainer" class="table-wrap"></div>
      </div>

      <div id="logsPane" class="tab-pane">
        <div id="logsList" class="log-list"></div>
      </div>
    </div>
  </div>

  <aside id="debugPanel" class="debug-panel" aria-live="polite">
    <div class="debug-header">
      <div class="debug-title">Debug Panel</div>
      <div class="debug-actions">
        <button class="debug-btn" onclick="copyDebugInfo()">Copy Debug Info</button>
        <button class="debug-btn" onclick="toggleDebugPanel()">Hide</button>
      </div>
    </div>
    <div class="debug-grid">
      <div class="debug-stat">
        <div class="debug-label">Mode</div>
        <div class="debug-value" id="debugModeValue">Waiting</div>
      </div>
      <div class="debug-stat">
        <div class="debug-label">Host</div>
        <div class="debug-value" id="debugHostValue">Waiting</div>
      </div>
      <div class="debug-stat">
        <div class="debug-label">Firebase</div>
        <div class="debug-value" id="debugFirebaseValue">Waiting</div>
      </div>
      <div class="debug-stat">
        <div class="debug-label">Web NFC</div>
        <div class="debug-value" id="debugNfcValue">Waiting</div>
      </div>
    </div>
    <div class="debug-log" id="debugLog">Debug panel ready.</div>
  </aside>

  <script src="./config.demo.js"></script>
  <script src="./config.local.js"></script>
  <script>
    (function bootApp() {
      if (window.location.protocol === 'file:') {
        document.body.innerHTML = `
          <div style="min-height:100vh;display:grid;place-items:center;padding:24px;background:#f5f7fa;font-family:Arial,sans-serif;">
            <div style="max-width:720px;background:#fff;border-radius:18px;padding:28px;box-shadow:0 10px 30px rgba(0,0,0,.08);color:#111827;">
              <h1 style="margin:0 0 12px;font-size:30px;">Open this app from localhost</h1>
              <p style="margin:0 0 10px;line-height:1.6;">This app uses a browser module setup for Firebase, so opening <strong>index.html</strong> directly with <strong>file://</strong> will not work correctly.</p>
              <p style="margin:0 0 10px;line-height:1.6;">Use one of these simple options instead:</p>
              <ul style="margin:0 0 18px 20px;line-height:1.7;">
                <li>Double-click <strong>start-local.bat</strong></li>
                <li>Run <strong>npm run preview:open</strong></li>
                <li>Open <strong>http://127.0.0.1:4173/?debug=1</strong> if the local preview is already running</li>
              </ul>
              <button onclick="window.location.href='http://127.0.0.1:4173/?debug=1'" style="border:none;border-radius:14px;padding:14px 18px;background:#111827;color:#fff;font-size:16px;font-weight:700;cursor:pointer;">Try localhost preview</button>
            </div>
          </div>
        `;
        return;
      }

      const script = document.createElement('script');
      script.type = 'module';
      script.src = './app.js';
      document.body.appendChild(script);
    })();
  </script>
</body>
</html>
