<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NFC Safety Demo</title>

<style>
* { box-sizing:border-box; }

body {
  margin:0;
  font-family:Arial;
  background:#666;
}

/* ===== HOME ===== */
.home-screen {
  position:relative;
  min-height:100vh;
  background:url('background.jpeg') center/cover no-repeat;
  display:flex;
  flex-direction:column;
  justify-content:flex-end;
  padding:20px;
}

/* DEMO למטה */
.demo-badge-bottom {
  position:absolute;
  bottom:20px;
  left:20px;
  color:white;
  font-weight:bold;
  font-size:14px;
  background:rgba(0,0,0,0.4);
  padding:6px 12px;
  border-radius:10px;
}

/* כפתורים */
.actions {
  display:flex;
  flex-direction:column;
  gap:15px;
}

.btn {
  border:none;
  padding:18px;
  font-size:18px;
  border-radius:15px;
  font-weight:bold;
  cursor:pointer;
}

.btn-check { background:#0f766e; color:white; }
.btn-register { background:#eee; }

/* ===== SCREENS ===== */
.screen {
  display:none;
  min-height:100vh;
  padding:20px;
  background:#f5f5f5;
}

.screen.active { display:block; }

.back-btn {
  margin-bottom:20px;
  padding:10px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

.main-action {
  width:100%;
  padding:18px;
  font-size:18px;
  border:none;
  border-radius:12px;
  background:#0f766e;
  color:white;
  cursor:pointer;
}

.status {
  margin-top:10px;
}

</style>
</head>

<body>

<!-- ===== HOME ===== -->
<div id="homeScreen" class="home-screen">

  <div class="actions">
    <button class="btn btn-check" onclick="openScreen('scanScreen')">בדיקת ציוד</button>
    <button class="btn btn-register" onclick="openScreen('registerScreen')">קליטת ציוד</button>
  </div>

  <div class="demo-badge-bottom">DEMO®</div>

</div>

<!-- ===== SCAN ===== -->
<div id="scanScreen" class="screen">
  <button class="back-btn" onclick="goHome()">חזרה</button>
  <h2>בדיקת ציוד</h2>

  <button class="main-action" onclick="startScan('scan')">סרוק עכשיו</button>
  <div id="scanStatus" class="status">ממתין לסריקה</div>
</div>

<!-- ===== REGISTER ===== -->
<div id="registerScreen" class="screen">
  <button class="back-btn" onclick="goHome()">חזרה</button>
  <h2>קליטת ציוד</h2>

  <button class="main-action" onclick="startScan('register')">סרוק תג</button>
  <div id="registerStatus" class="status">ממתין לסריקה</div>
</div>

<script>

/* ניווט */
function openScreen(id){
  document.getElementById("homeScreen").style.display="none";
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function goHome(){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById("homeScreen").style.display="flex";
}

/* NFC */
async function startScan(mode){

  const statusEl = mode === 'scan'
    ? document.getElementById("scanStatus")
    : document.getElementById("registerStatus");

  if(!("NDEFReader" in window)){
    statusEl.textContent = "אין תמיכה ב-NFC במכשיר הזה";
    return;
  }

  try{
    const reader = new NDEFReader();
    await reader.scan();

    statusEl.textContent = "ממתין להצמדת תג...";

    reader.onreading = event => {
      statusEl.textContent = "נקרא תג: " + event.serialNumber;
    };

  } catch(e){
    statusEl.textContent = "שגיאה בהפעלת NFC";
  }
}

</script>

</body>
</html>
