<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NFC Safety Demo B17</title>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: #f3f7fb; font-family: Arial, Helvetica, sans-serif; color: #0f172a; }
    .page { max-width: 760px; margin: 0 auto; padding: 12px; }
    .langbar {
      display:flex; gap:8px; justify-content:flex-start; padding:0 0 12px 0; flex-wrap:wrap;
    }
    .flag-btn {
      border: 1px solid #dbe7ef; background:#fff; border-radius: 999px; width:54px; height:54px; font-size:24px; cursor:pointer;
      box-shadow: 0 4px 10px rgba(15,23,42,.05);
      display:flex; align-items:center; justify-content:center;
      padding: 0;
      overflow: hidden;
      flex: 0 0 54px;
    }
    .flag-svg {
      width: 28px;
      height: 28px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .flag-svg svg {
      width: 28px;
      height: 28px;
      display: block;
      border-radius: 999px;
      box-shadow: inset 0 0 0 0.5px rgba(15,23,42,.12);
    }
    .flag-btn.active { outline: 2px solid #16a34a; }
    .flag-btn.mode-btn { font-size: 22px; }
    .card {
      background: #ffffff;
      border: 1px solid #dbe7ef;
      border-radius: 22px;
      overflow: hidden;
      box-shadow: 0 10px 24px rgba(15,23,42,.06);
    }
    .hero {
      display: grid;
      grid-template-columns: 1fr 120px;
      gap: 16px;
      align-items: center;
      padding: 16px 18px;
      background: linear-gradient(90deg,#ffffff 0%,#ecfdf5 100%);
      border-bottom: 1px solid #dcfce7;
      position: relative;
    }
    .hero::before {
      content: "";
      position: absolute;
      inset-inline-start: 0;
      top: 0;
      bottom: 0;
      width: 7px;
      background: #16a34a;
    }
    .hero-text { text-align: right; }
    .hero-image { width: 120px; }
    .photo {
      width: 120px; height: 120px; object-fit: cover; border-radius: 14px; border: 1px solid #dbe2ea; background: #fff;
      display: block; box-shadow: 0 8px 18px rgba(15,23,42,.08);
    }
    .title { margin: 0 0 6px 0; font-size: 34px; line-height: 1.05; font-weight: 700; color: #0f172a; }
    .subtitle { margin: 0; font-size: 17px; color: #64748b; }
    .status-row {
      display: grid; grid-template-columns: 1fr auto; gap: 12px; align-items: center;
      padding: 14px 18px; background: #f8fffb; border-bottom: 1px solid #e5f5ec;
    }
    .status-title { font-size: 14px; color: #64748b; margin-bottom: 3px; }
    .status-value { font-size: 22px; font-weight: 700; color: #15803d; }
    .badge {
      display: inline-block; background: linear-gradient(135deg,#16a34a,#22c55e); color: #fff; font-size: 15px; font-weight: 700;
      padding: 8px 12px; border-radius: 12px; white-space: nowrap; box-shadow: 0 8px 18px rgba(34,197,94,.22);
    }
    .edit-note {
      display:none;
      padding: 10px 18px;
      background: #fff7ed;
      border-bottom: 1px solid #fed7aa;
      color: #9a3412;
      font-size: 14px;
      font-weight: 700;
    }
    .edit-note.open { display:block; }
    .grid { display: grid; grid-template-columns: 1fr; gap: 10px; padding: 14px; background: #ffffff; }
    .field {
      width: 100%; margin: 0; box-sizing: border-box; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 14px; padding: 12px 14px;
    }
    .field.highlight { background: #f0fdf4; border-color: #bbf7d0; }
    .k { color: #64748b; font-size: 13px; margin-bottom: 6px; }
    .v { color: #0f172a; font-size: 16px; font-weight: 700; line-height: 1.25; word-break: break-word; }
    button.field {
      cursor: pointer; text-align: center; font-size: 18px; font-weight: 700; box-shadow: none; transition: transform .15s ease, box-shadow .15s ease;
    }
    button.field:active { transform: scale(0.98); }
    .danger-btn { background: #e52323; border-color: #b91c1c; color: #fff; display:none; }
    .danger-btn.open { display:block; }
    .danger-btn .v { color: #fff; margin: 0; }
    .info-btn { background: #0b1736; border-color: #0b1736; color: #fff; }
    .info-btn .v { color: #fff; margin: 0; }
    .note { background: #f8fafc; border: 1px solid #e5e7eb; color: #475467; font-size: 14px; }
    .engineer-card { display:none; background:#fff7ed; border-color:#fed7aa; }
    .engineer-card.open { display:block; }
    .engineer-title { color:#9a3412; font-weight:700; font-size:14px; margin-bottom:10px; }
    .engineer-panel { display:grid; grid-template-columns:1fr; gap:10px; }
    .edit-input, .edit-select {
      width: 100%; border: 1px solid #d0d7e2; border-radius: 10px; padding: 10px 12px; font-size: 16px; background: #fff; color: #0f172a;
    }

    .modal-backdrop {
      position: fixed; inset: 0; background: rgba(15,23,42,0.55); display: none; align-items: center; justify-content: center; padding: 16px; z-index: 9999;
    }
    .modal-backdrop.open { display: flex; }
    .modal { width: min(100%, 520px); background: #ffffff; border-radius: 18px; box-shadow: 0 18px 40px rgba(15,23,42,.22); overflow: hidden; }
    .modal-header {
      display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 14px 16px; border-bottom: 1px solid #e5e7eb; background: #f8fafc;
    }
    .modal-title { margin: 0; font-size: 18px; font-weight: 700; color: #0f172a; }
    .close-btn {
      border: none; background: #e5e7eb; color: #0f172a; width: 32px; height: 32px; border-radius: 999px; font-size: 18px; font-weight: 700; cursor: pointer;
    }
    .modal-body { padding: 16px; background: #ffffff; }
    .safety-list { margin: 0; padding: 0 20px 0 0; color: #334155; line-height: 1.8; font-size: 15px; }
    .safety-note { margin-top: 12px; padding: 10px 12px; border-radius: 12px; background: #ecfdf5; color: #166534; font-size: 13px; font-weight: 700; }
  a { text-decoration: none; color: #2563eb; font-weight: 500; }
</style>
</head>

: "工程师姓名", "saveChanges": "保存更改", "loginPrompt": "输入工程师密码 (1234)", "loginSuccess": "编辑模式已启用", "loginError": "密码错误", "statusApprovedOption": "允许", "statusRejectedOption": "作废"}};
    let currentLang = 'he';
    let rejected = false;
    let repairMode = false;
    let engineerMode = false;


    function engineerContactHTML(lang) {
      const map = {
        he: 'דוד כהן | <a href="tel:0501234567">📞 050-1234567</a> | <a href="mailto:david@test.com">✉️ david@test.com</a>',
        en: 'David Cohen | <a href="tel:0501234567">📞 050-1234567</a> | <a href="mailto:david@test.com">✉️ david@test.com</a>',
        ar: 'دافيد كوهين | <a href="tel:0501234567">📞 050-1234567</a> | <a href="mailto:david@test.com">✉️ david@test.com</a>',
        zh: 'David Cohen | <a href="tel:0501234567">📞 050-1234567</a> | <a href="mailto:david@test.com">✉️ david@test.com</a>'
      };
      return map[lang] || map.he;
    }

    function isRTL(lang) {
      return ['he','ar'].includes(lang);
    }

    function setLang(lang) {
      currentLang = lang;
      const t = translations[lang];
      document.documentElement.lang = lang;
      document.documentElement.dir = isRTL(lang) ? 'rtl' : 'ltr';

      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (t[key]) el.textContent = t[key];
      });

      document.getElementById('engineerNameValue').innerHTML = engineerContactHTML(lang);

      const list = document.getElementById('safetyList');
      list.innerHTML = '';
      t.safetyItems.forEach(item => {
        const li = document.createElement('li');
        li.textContent = item;
        list.appendChild(li);
      });

      const statusSelect = document.getElementById('engineerStatus');
      statusSelect.innerHTML = '';
      const opt1 = document.createElement('option');
      opt1.value = 'approved';
      opt1.textContent = t.statusApprovedOption;
      const opt2 = document.createElement('option');
      opt2.value = 'rejected';
      opt2.textContent = t.statusRejectedOption;
      const opt3 = document.createElement('option');
      opt3.value = 'repair';
      if(currentLang==='he'){opt3.textContent='פסול אך ניתן לתיקון – נא לפנות למהנדס';}
else if(currentLang==='en'){opt3.textContent='Rejected but repairable – please contact the engineer';}
else if(currentLang==='ar'){opt3.textContent='مرفوض ولكن قابل للإصلاح – يرجى التواصل مع المهندس';}
else if(currentLang==='zh'){opt3.textContent='已判定不合格但可修复，请联系工程师';}
else{opt3.textContent=t.statusRepairOption;}
      statusSelect.appendChild(opt1);
      statusSelect.appendChild(opt2);
      statusSelect.appendChild(opt3);

      updateStatusUI();
      updateEngineerUI();
      loadStoredScanLog();

      document.querySelectorAll('.flag-btn[data-lang]').forEach(btn => btn.classList.remove('active'));
      const active = document.querySelector(`[data-lang="${lang}"]`);
      if (active) active.classList.add('active');
    }

    function updateStatusUI() {
      const t = translations[currentLang];
      const status = document.getElementById('statusValue');
      const badge = document.getElementById('statusBadge');
      const btn = document.getElementById('toggleBtnText');

      if (repairMode) {
        status.innerText = t.statusRepairOption;
        status.style.color = '#d97706';
        badge.innerText = '⚠️';
        badge.style.background = '#d97706';
        btn.innerText = t.restoreButton;
      } else if (rejected) {
        status.innerText = t.rejectedStatus;
        status.style.color = '#dc2626';
        badge.innerText = t.rejectedBadge;
        badge.style.background = '#dc2626';
        btn.innerText = t.restoreButton;
      } else {
        status.innerText = t.approvedStatus;
        status.style.color = '#15803d';
        badge.innerText = t.approvedBadge;
        badge.style.background = 'linear-gradient(135deg,#16a34a,#22c55e)';
        btn.innerText = t.rejectButton;
      }
    }

    function updateEngineerUI() {
      document.getElementById('engineerModeBtn').textContent = engineerMode ? '✏️' : '🔒';
      document.getElementById('engineerCard').classList.toggle('open', engineerMode);
      document.getElementById('toggleBtn').classList.toggle('open', engineerMode);
      document.getElementById('editNote').classList.toggle('open', engineerMode);

      document.getElementById('engineerStatus').value = repairMode ? 'repair' : (rejected ? 'rejected' : 'approved');
      document.getElementById('engineerLastInspection').value = document.getElementById('lastInspectionValue').textContent;
      document.getElementById('engineerNextInspection').value = document.getElementById('nextInspectionValue').textContent;
      const currentEngineerText = document.getElementById('engineerNameValue').textContent.split('|')[0].trim();
      document.getElementById('engineerNameInput').value = currentEngineerText;
    }

    function toggleEngineerMode() {
      const t = translations[currentLang];
      if (!engineerMode) {
        const pass = prompt(t.loginPrompt);
        if (pass === '1234') {
          engineerMode = true;
          updateEngineerUI();
          
        } else if (pass !== null) {
          alert(t.loginError);
        }
      } else {
        engineerMode = false;
        updateEngineerUI();
      }
    }

    function saveEngineerChanges() {
      if (!engineerMode) return;
      const selectedStatus = document.getElementById('engineerStatus').value;
      rejected = selectedStatus === 'rejected';
      repairMode = selectedStatus === 'repair';
      document.getElementById('lastInspectionValue').textContent = document.getElementById('engineerLastInspection').value;
      document.getElementById('nextInspectionValue').textContent = document.getElementById('engineerNextInspection').value;
      const engineerName = document.getElementById('engineerNameInput').value || 'David Cohen';
      document.getElementById('engineerNameValue').innerHTML =
        engineerName + ' | <a href="tel:0501234567">📞 050-1234567</a> | <a href="mailto:david@test.com">✉️ david@test.com</a>';
      updateStatusUI();
    }

    function toggleStatus() {
      if (!engineerMode) return;
      repairMode = false;
      rejected = !rejected;
      updateStatusUI();
      updateEngineerUI();
    }

    function openSafetyModal() {
      document.getElementById('safetyModal').classList.add('open');
    }
    function closeSafetyModal() {
      document.getElementById('safetyModal').classList.remove('open');
    }
    function backdropClose(event) {
      if (event.target.id === 'safetyModal') closeSafetyModal();
    }


    function formatNow(lang) {
      const now = new Date();
      try {
        return new Intl.DateTimeFormat(lang === 'zh' ? 'zh-CN' : lang, {
          year: 'numeric', month: '2-digit', day: '2-digit',
          hour: '2-digit', minute: '2-digit'
        }).format(now);
      } catch(e) {
        return now.toLocaleString();
      }
    }

    function updateScanLogText(text) {
      const el = document.getElementById('scanLogValue');
      if (el) el.textContent = text;
    }

    function loadStoredScanLog() {
      const raw = localStorage.getItem('nfcScanLog_NFCSH5001');
      const t = translations[currentLang];
      if (!raw) {
        updateScanLogText(t.scanLogEmpty);
        return;
      }
      try {
        const data = JSON.parse(raw);
        const txt = `${t.scanLogPrefix}: ${data.coords} | ${data.time}`;
        updateScanLogText(txt);
      } catch(e) {
        updateScanLogText(t.scanLogEmpty);
      }
    }

    let lastCoords = null;
    function saveScanLog(coordsText, lat=null, lon=null) {
      if(lat && lon){
        lastCoords = {lat, lon};
      }
      const data = {
        coords: coordsText,
        time: formatNow(currentLang)
      };
      localStorage.setItem('nfcScanLog_NFCSH5001', JSON.stringify(data));
      loadStoredScanLog();
    }

    
    async function reverseGeocode(lat, lon) {
      try {
        const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lon}`);
        const data = await res.json();
        const addr = data.address || {};
        const road = addr.road || addr.pedestrian || addr.footway || '';
        const house = addr.house_number || '';
        const city = addr.city || addr.town || addr.village || '';
        let result = [road, house, city].filter(Boolean).join(' ');
        if (!result) result = data.display_name;
        return result;
      } catch(e) {
        return null;
      }
    }

    function requestLocationLog() {
      const t = translations[currentLang];
      if (!navigator.geolocation) {
        updateScanLogText(t.scanLogUnavailable);
        return;
      }
      navigator.geolocation.getCurrentPosition(
        async (pos) => {
          const lat = pos.coords.latitude.toFixed(5);
          const lon = pos.coords.longitude.toFixed(5);
          const address = await reverseGeocode(lat, lon);
          const text = address ? address : `${lat}, ${lon}`;
          saveScanLog(text, lat, lon);
        },
        (err) => {
          if (err && err.code === 1) updateScanLogText(t.scanLogDenied);
          else updateScanLogText(t.scanLogUnavailable);
        },
        { enableHighAccuracy: true, timeout: 8000, maximumAge: 60000 }
      );
    }

    setLang(currentLang);
    loadStoredScanLog();
    requestLocationLog();

    document.getElementById('scanLogValue').addEventListener('click', function(){
      if(lastCoords){
        const url = `https://www.google.com/maps?q=${lastCoords.lat},${lastCoords.lon}`;
        window.open(url, '_blank');
      }
    });
  </script>
</body>
