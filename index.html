  <script>
    (async function bootApp() {
      const BOOTSTRAP_ASSET_VERSION = '20260406refreshcore002';
      const VERSION_MANIFEST_URL = './version.json';

      const appendScript = (src, { module = false, optional = false } = {}) => new Promise((resolve, reject) => {
        const script = document.createElement('script');
        script.src = src;
        if (module) script.type = 'module';
        script.onload = () => resolve(true);
        script.onerror = () => optional ? resolve(false) : reject(new Error(`Failed to load script: ${src}`));
        document.body.appendChild(script);
      });

      const getAssetVersion = async () => {
        try {
          const response = await fetch(`${VERSION_MANIFEST_URL}?t=${Date.now()}`, { cache: 'no-store' });
          if (!response.ok) {
            throw new Error(`Version manifest request failed with ${response.status}`);
          }
          const payload = await response.json();
          return payload?.version || BOOTSTRAP_ASSET_VERSION;
        } catch (error) {
          console.warn('Falling back to bootstrap asset version.', error);
          return BOOTSTRAP_ASSET_VERSION;
        }
      };

      if (window.location.protocol === 'file:') {
        document.body.innerHTML = `
          <div style="min-height:100vh;display:grid;place-items:center;padding:24px;background:#f5f7fa;font-family:Arial,sans-serif;">
            <div style="max-width:720px;background:#fff;border-radius:18px;padding:28px;box-shadow:0 10px 30px rgba(0,0,0,.08);color:#111827;">
              <h1 style="margin:0 0 12px;font-size:30px;">Open this app from localhost</h1>
              <p style="margin:0 0 10px;line-height:1.6;">This app uses a browser module setup for Firebase, so opening <strong>index.html</strong> directly with <strong>file://</strong> will not work correctly.</p>
              <p style="margin:0 0 10px;line-height:1.6;">Use one of these simple options instead:</p>
              <ul style="margin:0 0 18px 20px;line-height:1.7;">
                <li>Double-click <strong>start-local.bat</strong></li>
                <li>Run <strong>npm run preview:open</strong></li>
                <li>Open <strong>http://127.0.0.1:4173/?debug=1</strong> if the local preview is already running</li>
              </ul>
              <button onclick="window.location.href='http://127.0.0.1:4173/?debug=1'" style="border:none;border-radius:14px;padding:14px 18px;background:#111827;color:#fff;font-size:16px;font-weight:700;cursor:pointer;">Try localhost preview</button>
            </div>
          </div>
        `;
        return;
      }

      const assetVersion = await getAssetVersion();
      window.__ASSET_VERSION = assetVersion;

      const stylesheet = document.getElementById('appStylesheet');
      if (stylesheet) {
        stylesheet.href = `./styles.css?v=${encodeURIComponent(assetVersion)}`;
      }

      await appendScript(`./config.demo.js?v=${encodeURIComponent(assetVersion)}`);
      await appendScript(`./config.local.js?v=${encodeURIComponent(assetVersion)}`, { optional: true });
      await appendScript(`./app.js?v=${encodeURIComponent(assetVersion)}`, { module: true });
    })();
  </script>
