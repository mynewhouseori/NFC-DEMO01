<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NFC Safety Demo</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      font-family: Arial, sans-serif;
      overflow: hidden;
      background: #888;
    }

    body {
      background: url('background.jpg') center center / cover no-repeat;
      position: relative;
    }

    .overlay {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.35);
    }

    .home-screen {
      position: relative;
      z-index: 2;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .actions {
      width: 100%;
      max-width: 340px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .btn {
      width: 100%;
      border: none;
      border-radius: 16px;
      padding: 22px 18px;
      font-size: 28px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 8px 24px rgba(0,0,0,0.18);
    }

    .btn-check {
      background: #0f766e;
      color: white;
    }

    .btn-register {
      background: #ececf1;
      color: #111827;
    }

    .btn:active {
      transform: scale(0.99);
    }

    .screen {
      display: none;
      position: relative;
      z-index: 3;
      width: 100%;
      height: 100%;
      overflow-y: auto;
      background: rgba(245, 247, 250, 0.96);
      padding: 18px;
    }

    .screen.active {
      display: block;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }

    .back-btn {
      border: none;
      border-radius: 12px;
      padding: 12px 16px;
      background: #e5e7eb;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }

    .card {
      max-width: 760px;
      margin: 0 auto 16px;
      background: white;
      border-radius: 18px;
      padding: 18px;
      box-shadow: 0 4px 18px rgba(0,0,0,0.08);
    }

    h1, h2, h3 {
      margin: 0 0 14px;
      color: #1f2937;
    }

    .main-action {
      width: 100%;
      border: none;
      border-radius: 14px;
      padding: 18px;
      font-size: 22px;
      font-weight: 700;
      background: #0f766e;
      color: white;
      cursor: pointer;
      margin-bottom: 14px;
    }

    .status {
      margin-top: 12px;
      font-size: 16px;
      font-weight: 700;
      color: #374151;
    }

    .muted {
      color: #6b7280;
    }

    label {
      display: block;
      margin: 10px 0 6px;
      font-weight: 700;
      color: #374151;
    }

    input, select {
      width: 100%;
      padding: 12px;
      border: 1px solid #cbd5e1;
      border-radius: 12px;
      font-size: 16px;
      background: white;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    @media (max-width: 700px) {
      .row {
        grid-template-columns: 1fr;
      }

      .btn {
        font-size: 24px;
        padding: 20px 16px;
      }
    }

    .preview-wrap {
      display: flex;
      align-items: end;
      gap: 12px;
    }

    .preview-box {
      width: 92px;
      aspect-ratio: 1 / 1;
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid #d1d5db;
      background: white;
      flex-shrink: 0;
    }

    .preview-box img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .save-btn {
      width: 100%;
      border: none;
      border-radius: 14px;
      padding: 16px;
      font-size: 20px;
      font-weight: 700;
      background: #0f766e;
      color: white;
      cursor: pointer;
      margin-top: 14px;
    }

    .result-card {
      display: none;
      margin-top: 14px;
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      padding: 14px;
      background: #fff;
    }

    .result-card.active {
      display: block;
    }

    .result-grid {
      display: grid;
      grid-template-columns: 110px 1fr;
      gap: 14px;
      align-items: start;
    }

    @media (max-width: 600px) {
      .result-grid {
        grid-template-columns: 1fr;
      }
    }

    .thumb {
      width: 110px;
      aspect-ratio: 1 / 1;
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid #d1d5db;
      background: white;
      margin-inline: auto;
    }

    .thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .mono {
      font-family: monospace;
      direction: ltr;
      display: inline-block;
    }

    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <div class="overlay"></div>

  <!-- מסך פתיחה -->
  <div id="homeScreen" class="home-screen">
    <div class="actions">
      <button class="btn btn-check" onclick="openScreen('scanScreen')">🔍 בדיקת ציוד</button>
      <button class="btn btn-register" onclick="openScreen('registerScreen')">➕ קליטת ציוד</button>
    </div>
  </div>

  <!-- מסך בדיקה -->
  <div id="scanScreen" class="screen">
    <div class="topbar card">
      <button class="back-btn" onclick="goHome()">חזרה</button>
      <h2>בדיקת ציוד</h2>
    </div>

    <div class="card">
      <button class="main-action" onclick="startScan('scan')">סרוק עכשיו</button>
      <div id="scanStatus" class="status muted">ממתין לסריקה.</div>

      <div id="scanResult" class="result-card">
        <div class="result-grid">
          <div class="thumb">
            <img id="scanItemImage" src="" alt="תמונת פריט">
          </div>
          <div>
            <h3 id="scanItemType">פריט</h3>
            <div>Tag ID: <span id="scanTagId" class="mono"></span></div>
            <div>תיאור: <span id="scanDescription"></span></div>
            <div>מספר סידורי: <span id="scanSerial"></span></div>
            <div>עומס מותר: <span id="scanWll"></span></div>
            <div>בדיקה הבאה: <span id="scanNextInspection"></span></div>
            <div>סטטוס: <span id="scanItemStatus"></span></div>
            <div>הערות: <span id="scanNotes"></span></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- מסך קליטה -->
  <div id="registerScreen" class="screen">
    <div class="topbar card">
      <button class="back-btn" onclick="goHome()">חזרה</button>
      <h2>קליטת ציוד</h2>
    </div>

    <div class="card">
      <button class="main-action" onclick="startScan('register')">סרוק תג חדש</button>
      <div id="registerStatus" class="status muted">ממתין לסריקה.</div>
    </div>

    <div class="card">
      <div class="row">
        <div>
          <label for="tagId">Tag ID</label>
          <input id="tagId" placeholder="יתמלא אחרי סריקה או ידנית">
        </div>

        <div>
          <div class="preview-wrap">
            <div style="flex:1;">
              <label for="itemType">סוג פריט</label>
              <select id="itemType">
                <option value="שאקל">שאקל</option>
                <option value="רצועה">רצועה</option>
                <option value="שרשרת">שרשרת</option>
                <option value="טבעת">טבעת</option>
                <option value="וו">וו</option>
                <option value="אחר">אחר</option>
              </select>
            </div>

            <div>
              <label>תמונה</label>
              <div class="preview-box">
                <img id="selectedImagePreview" src="" alt="תמונה">
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="row">
        <div>
          <label for="description">תיאור</label>
          <input id="description" placeholder="למשל: Shackle 3/4">
        </div>
        <div>
          <label for="serialNumber">מספר סידורי</label>
          <input id="serialNumber" placeholder="למשל: GP-77421">
        </div>
      </div>

      <div class="row">
        <div>
          <label for="wll">עומס מותר (WLL)</label>
          <input id="wll" placeholder="למשל: 4.75T">
        </div>
        <div>
          <label for="nextInspection">בדיקה הבאה</label>
          <input id="nextInspection" type="date">
        </div>
      </div>

      <div class="row">
        <div>
          <label for="itemStatus">סטטוס</label>
          <select id="itemStatus">
            <option value="תקין">תקין</option>
            <option value="לבדיקה">לבדיקה</option>
            <option value="מושבת">מושבת</option>
          </select>
        </div>
        <div>
          <label for="notes">הערות</label>
          <input id="notes" placeholder="אופציונלי">
        </div>
      </div>

      <button class="save-btn" onclick="saveItem()">שמור פריט</button>
      <div id="saveStatus" class="status muted"></div>
    </div>
  </div>

    let currentMode = '';

    const el = (id) => document.getElementById(id);

    function getItems() {
      return JSON.parse(localStorage.getItem(ITEMS_KEY) || '[]');
    }

    function setItems(items) {
      localStorage.setItem(ITEMS_KEY, JSON.stringify(items));
    }

    function openScreen(screen
