<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NFC Safety Demo</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Arial, sans-serif;
  color: white;

  /* ✅ הרקע שלך */
  background: url('background.jpeg') center center / cover no-repeat;

  /* שכבה כהה מקצועית */
  position: relative;
  min-height: 100vh;
}

/* שכבת כהות */
body::before {
  content: "";
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 1;
}

/* תוכן מעל */
.container {
  position: relative;
  z-index: 2;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* כפתורים */
button {
  width: 220px;
  padding: 15px;
  margin: 10px;
  font-size: 18px;
  border: none;
  border-radius: 12px;
  background: #00c853;
  color: white;
  cursor: pointer;
}

button:hover {
  background: #00a844;
}
</style>
</head>

<body>

<div class="container">
  <h1>NFC Safety</h1>

  <button onclick="alert('בדיקת תקינות')">בדיקה</button>
  <button onclick="alert('היסטוריה')">היסטוריה</button>
  <button onclick="alert('דיווח תקלה')">דיווח</button>
</div>

</body>
</html>
