<body style="margin:0; font-family:Arial, sans-serif;">

<div style="
  position:relative;
  height:100vh;
  background:url('background.jpg') center/cover no-repeat;
">

  <!-- שכבת כהות -->
  <div style="
    position:absolute;
    top:0; left:0; right:0; bottom:0;
    background:rgba(0,0,0,0.45);
  "></div>

  <!-- תוכן -->
  <div style="
    position:relative;
    z-index:2;
    height:100%;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    gap:20px;
  ">

    <!-- בדיקה -->
    <button onclick="setMode('scan')" style="
      width:85%;
      max-width:320px;
      padding:22px;
      font-size:22px;
      border:none;
      border-radius:14px;
      background:#0f766e;
      color:white;
      font-weight:bold;
    ">
      🔍 בדיקת ציוד
    </button>

    <!-- קליטה -->
    <button onclick="setMode('register')" style="
      width:85%;
      max-width:320px;
      padding:22px;
      font-size:22px;
      border:none;
      border-radius:14px;
      background:#e5e7eb;
      color:#111;
      font-weight:bold;
    ">
      ➕ קליטת ציוד
    </button>

  </div>
</div>

</body>
