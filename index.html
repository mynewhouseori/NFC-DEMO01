<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NFC Safety Demo v40</title>
  <style>
    * { box-sizing: border-box; }

    :root{
      --accent:#0f766e;
      --text:#111827;
      --muted:#6b7280;
      --line:#d1d5db;
      --danger:#b91c1c;
      --ok:#15803d;
      --warn:#d97706;
      --bad:#dc2626;
      --tab:#e5e7eb;
    }

    html, body {
      margin:0;
      padding:0;
      width:100%;
      height:100%;
      font-family:Arial,sans-serif;
      background:#666;
      color:var(--text);
    }

    body {
      position:relative;
      min-height:100vh;
    }

    .overlay {
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.42);
      z-index:0;
      pointer-events:none;
    }

    .home-screen {
      position:relative;
      z-index:2;
      width:100%;
      min-height:100vh;
      display:flex;
      flex-direction:column;
      justify-content:flex-end;
      padding:24px;
      background:url('background.jpeg') center center / cover no-repeat;
    }

    .lang-switch{
      position:absolute;
      top:16px;
      right:16px;
      z-index:4;
      display:flex;
      gap:10px;
      background:rgba(0,0,0,.28);
      border-radius:14px;
      padding:8px 10px;
      backdrop-filter: blur(3px);
    }

    .flag-btn{
      border:none;
      background:transparent;
      font-size:24px;
      cursor:pointer;
      line-height:1;
      padding:0;
    }

    .actions {
      width:100%;
      max-width:290px;
      display:flex;
      flex-direction:column;
      gap:16px;
      margin-inline:auto;
      margin-bottom:18px;
    }

    .demo-badge-bottom {
      position:absolute;
      left:20px;
      bottom:20px;
      color:#fff;
      font-weight:700;
      font-size:14px;
      background:rgba(0,0,0,.35);
      padding:6px 10px;
      border-radius:10px;
      z-index:3;
    }

    .btn {
      width:100%;
      border:none;
      border-radius:18px;
      padding:18px 16px;
      font-size:18px;
      font-weight:700;
      cursor:pointer;
      box-shadow:0 10px 28px rgba(0,0,0,.22);
      transition:transform .12s ease;
    }

    .btn:active { transform:scale(.98); }

    .btn-check { background:var(--accent); color:#fff; }
    .btn-register { background:#f0f1f4; color:var(--text); }

    .btn-inner {
      display:flex;
      align-items:center;
      justify-content:center;
      gap:10px;
    }

    .icon {
      font-size:21px;
      line-height:1;
    }

    .screen {
      display:none;
      position:relative;
      z-index:3;
      min-height:100vh;
      background:rgba(245,247,250,.97);
      padding:16px;
    }

    .screen.active { display:block; }

    .card {
      max-width:760px;
      margin:0 auto 14px;
      background:#fff;
      border-radius:18px;
      padding:16px;
      box-shadow:0 4px 18px rgba(0,0,0,.08);
    }

    .topbar {
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
    }

    .back-btn {
      border:none;
      background:#e5e7eb;
      color:#111827;
      border-radius:12px;
      padding:11px 16px;
      font-size:15px;
      font-weight:700;
      cursor:pointer;
    }

    h2, h3 { margin:0 0 12px; }

    .main-action, .save-btn, .password-btn, .secondary-btn {
      width:100%;
      border:none;
      border-radius:14px;
      padding:16px;
      font-size:18px;
      font-weight:700;
      cursor:pointer;
    }

    .main-action, .save-btn, .password-btn {
      background:var(--accent);
      color:#fff;
    }

    .secondary-btn {
      background:#9ca3af;
      color:#fff;
      margin-top:10px;
    }

    .status {
      margin-top:12px;
      font-size:15px;
      font-weight:700;
      min-height:22px;
      color:#374151;
    }

    .muted { color:var(--muted); }
    .error-text { color:var(--danger); }

    label {
      display:block;
      margin:10px 0 6px;
      font-weight:700;
    }

    input, select {
      width:100%;
      padding:12px;
      border-radius:12px;
      border:1px solid #cbd5e1;
      background:#fff;
      font-size:16px;
    }

    .row {
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
    }

    @media (max-width:700px){
      .row { grid-template-columns:1fr; }
    }

    .preview-wrap {
      display:flex;
      align-items:end;
      gap:12px;
    }

    .preview-box, .thumb {
      aspect-ratio:1/1;
      border-radius:14px;
      overflow:hidden;
      border:1px solid var(--line);
      background:#fff;
      flex-shrink:0;
    }

    .preview-box { width:92px; }
    .thumb { width:110px; margin-inline:auto; }

    .preview-box img, .thumb img {
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }

    .result-card {
      display:none;
      margin-top:14px;
      border:1px solid #e5e7eb;
      border-radius:16px;
      padding:14px;
      background:#fff;
    }

    .result-card.active { display:block; }

    .result-grid {
      display:grid;
      grid-template-columns:110px 1fr;
      gap:14px;
      align-items:start;
    }

    @media (max-width:600px){
      .result-grid { grid-template-columns:1fr; }
    }

    .mono {
      font-family:monospace;
      direction:ltr;
      display:inline-block;
    }

    .status-ok { color: var(--ok); font-weight:700; }
    .status-warn { color: var(--warn); font-weight:700; }
    .status-bad { color: var(--bad); font-weight:700; }

    .tabs {
      display:flex;
      gap:10px;
      margin-bottom:14px;
    }

    .tab-btn {
      flex:1;
      border:none;
      border-radius:14px;
      padding:12px 14px;
      font-size:16px;
      font-weight:700;
      cursor:pointer;
      background:var(--tab);
      color:#111827;
    }

    .tab-btn.active {
      background:var(--accent);
      color:#fff;
    }

    .tab-pane {
      display:none;
    }

    .tab-pane.active {
      display:block;
    }

    .log-list {
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .log-item {
      border:1px solid #e5e7eb;
      border-radius:14px;
      padding:12px;
      background:#fff;
    }

    .log-top {
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      margin-bottom:6px;
      font-weight:700;
    }

    .log-time {
      color:var(--muted);
      font-size:14px;
    }

    .empty-text {
      color:var(--muted);
      text-align:center;
      padding:16px 0;
    }
  </style>
</head>
<body>
  <div class="overlay"></div>

  <div id="homeScreen" class="home-screen">
    <div class="lang-switch">
      <button class="flag-btn" onclick="setLang('he')" aria-label="עברית">🇮🇱</button>
      <button class="flag-btn" onclick="setLang('en')" aria-label="English">🇺🇸</button>
    </div>

    <div class="actions">
      <button class="btn btn-check" onclick="openScreen('scanScreen')">
        <span class="btn-inner"><span id="homeCheckText"></span><span class="icon">🔍</span></span>
      </button>
      <button class="btn btn-register" onclick="openPasswordScreen()">
        <span class="btn-inner"><span id="homeRegisterText"></span><span class="icon">➕</span></span>
      </button>
    </div>

    <div class="demo-badge-bottom">DEMO®</div>
  </div>

  <div id="passwordScreen" class="screen">
    <div class="card topbar">
      <button class="back-btn" onclick="goHome()" id="passwordBackBtn"></button>
      <h2 id="passwordTitle"></h2>
    </div>
    <div class="card">
      <label for="passwordInput" id="passwordLabel"></label>
      <input id="passwordInput" type="password">
      <button class="password-btn" onclick="checkPassword()" id="passwordEnterBtn"></button>
      <div id="passwordStatus" class="status error-text"></div>
    </div>
  </div>

  <div id="scanScreen" class="screen">
    <div class="card topbar">
      <button class="back-btn" onclick="goHome()" id="scanBackBtn"></button>
      <h2 id="scanScreenTitle"></h2>
    </div>
    <div class="card">
      <button class="main-action" onclick="startScan('scan')" id="scanNowBtn"></button>
      <div id="scanStatus" class="status muted"></div>

      <div id="scanResult" class="result-card">
        <div class="result-grid">
          <div class="thumb"><img id="scanItemImage" src="" alt="Item image"></div>
          <div>
            <h3 id="scanItemType">פריט</h3>
            <div><span id="lblTagId"></span>: <span id="scanTagId" class="mono"></span></div>
            <div><span id="lblDescription"></span>: <span id="scanDescription"></span></div>
            <div><span id="lblSerial"></span>: <span id="scanSerial"></span></div>
            <div><span id="lblWll"></span>: <span id="scanWll"></span></div>
            <div><span id="lblNextInspection"></span>: <span id="scanNextInspection"></span></div>
            <div><span id="lblStatus"></span>: <span id="scanItemStatus"></span></div>
            <div><span id="lblNotes"></span>: <span id="scanNotes"></span></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="registerScreen" class="screen">
    <div class="card topbar">
      <button class="back-btn" onclick="goHome()" id="registerBackBtn"></button>
      <h2 id="registerScreenTitle"></h2>
    </div>

    <div class="card">
      <div class="tabs">
        <button class="tab-btn active" id="tabRegisterBtn" onclick="openRegisterTab('registerPane')"></button>
        <button class="tab-btn" id="tabLogsBtn" onclick="openRegisterTab('logsPane'); renderScanLogs()"></button>
      </div>

      <div id="registerPane" class="tab-pane active">
        <button class="main-action" onclick="startScan('register')" id="scanNewTagBtn"></button>
        <div id="registerStatus" class="status muted"></div>

        <div class="row">
          <div>
            <label for="tagId" id="tagIdLabel"></label>
            <input id="tagId">
          </div>
          <div>
            <div class="preview-wrap">
              <div style="flex:1;">
                <label for="itemType" id="itemTypeLabel"></label>
                <select id="itemType"></select>
              </div>
              <div>
                <label id="imageLabel"></label>
                <div class="preview-box"><img id="selectedImagePreview" src="" alt="Preview"></div>
              </div>
            </div>
          </div>
        </div>

        <div class="row">
          <div>
            <label for="description" id="descriptionLabel"></label>
            <input id="description">
          </div>
          <div>
            <label for="serialNumber" id="serialLabel"></label>
            <input id="serialNumber">
          </div>
        </div>

        <div class="row">
          <div>
            <label for="wll" id="wllLabel"></label>
            <input id="wll">
          </div>
          <div>
            <label for="nextInspection" id="nextInspectionLabel"></label>
            <input id="nextInspection" type="date">
          </div>
        </div>

        <div class="row">
          <div>
            <label for="itemStatus" id="itemStatusLabel"></label>
            <select id="itemStatus"></select>
          </div>
          <div>
            <label for="notes" id="notesLabel"></label>
            <input id="notes">
          </div>
        </div>

        <button class="save-btn" onclick="saveItem()" id="saveBtn"></button>
        <button class="secondary-btn" onclick="clearForm()" id="clearFormBtn"></button>
        <div id="saveStatus" class="status muted"></div>
      </div>

      <div id="logsPane" class="tab-pane">
        <div id="logsList" class="log-list"></div>
      </div>
    </div>
  </div>

    };

    const el = (id) => document.getElementById(id);
    let currentLang = localStorage.getItem('lang') || 'he';

    function t(key){
      return LANG[currentLang][key] || key;
    }

    function translateType(type){
      if(type === 'שאקל') return t('type_shackle');
      if(type === 'רצועה') return t('type_strap');
      if(type === 'שרשרת') return t('type_chain');
      if(type === 'טבעת') return t('type_ring');
      if(type === 'וו') return t('type_hook');
      if(type === 'אחר') return t('type_other');
      return type || t('scanItemDefault');
    }

    function translateStatus(status){
      if(status === 'תקין') return t('status_ok');
      if(status === 'לבדיקה') return t('status_review');
      if(status === 'מושבת') return t('status_disabled');
      return status || '-';
    }

    function applyStatusColor(node, status){
      node.classList.remove('status-ok', 'status-warn', 'status-bad');
      if(status === 'תקין'){
        node.classList.add('status-ok');
      } else if(status === 'לבדיקה'){
        node.classList.add('status-warn');
      } else if(status === 'מושבת'){
        node.classList.add('status-bad');
      }
    }

    function updateStatusOptions(){
      const current = el('itemStatus').value || 'תקין';
      el('itemStatus').innerHTML = `
        <option value="תקין">${t('status_ok')}</option>
        <option value="לבדיקה">${t('status_review')}</option>
        <option value="מושבת">${t('status_disabled')}</option>
      `;
      el('itemStatus').value = current;
    }

    function updateTypeOptions(){
      const current = el('itemType').value || 'שאקל';
      el('itemType').innerHTML = `
        <option value="שאקל">${t('type_shackle')}</option>
        <option value="רצועה">${t('type_strap')}</option>
        <option value="שרשרת">${t('type_chain')}</option>
        <option value="טבעת">${t('type_ring')}</option>
        <option value="וו">${t('type_hook')}</option>
        <option value="אחר">${t('type_other')}</option>
      `;
      el('itemType').value = current;
    }

    function setLang(lang){
      currentLang = lang;
      localStorage.setItem('lang', lang);
      document.documentElement.lang = lang;
      document.documentElement.dir = LANG[lang].dir;

      el('homeCheckText').textContent = t('homeCheck');
      el('homeRegisterText').textContent = t('homeRegister');

      el('passwordBackBtn').textContent = t('back');
      el('passwordTitle').textContent = t('passwordTitle');
      el('passwordLabel').textContent = t('passwordLabel');
      el('passwordInput').placeholder = t('passwordPlaceholder');
      el('passwordEnterBtn').textContent = t('passwordEnter');

      el('scanBackBtn').textContent = t('back');
      el('scanScreenTitle').textContent = t('scanTitle');
      el('scanNowBtn').textContent = t('scanNow');

      el('registerBackBtn').textContent = t('back');
      el('registerScreenTitle').textContent = t('registerTitle');
      el('tabRegisterBtn').textContent = t('tabRegister');
      el('tabLogsBtn').textContent = t('tabLogs');
      el('scanNewTagBtn').textContent = t('scanNewTag');
      el('clearFormBtn').textContent = t('clearForm');

      el('tagIdLabel').textContent = t('tagId');
      el('itemTypeLabel').textContent = t('itemType');
      el('imageLabel').textContent = t('image');
      el('descriptionLabel').textContent = t('description');
      el('serialLabel').textContent = t('serial');
      el('wllLabel').textContent = t('wll');
      el('nextInspectionLabel').textContent = t('nextInspection');
      el('itemStatusLabel').textContent = t('status');
      el('notesLabel').textContent = t('notes');
      el('saveBtn').textContent = t('saveItem');

      el('tagId').placeholder = t('tagPlaceholder');
      el('description').placeholder = t('descriptionPlaceholder');
      el('serialNumber').placeholder = t('serialPlaceholder');
      el('wll').placeholder = t('wllPlaceholder');
      el('notes').placeholder = t('notesPlaceholder');

      el('lblTagId').textContent = t('tagId');
      el('lblDescription').textContent = t('description');
      el('lblSerial').textContent = t('serial');
      el('lblWll').textContent = t('wll');
      el('lblNextInspection').textContent = t('nextInspection');
      el('lblStatus').textContent = t('status');
      el('lblNotes').textContent = t('notes');

      updateTypeOptions();
      updateStatusOptions();
      selectImageByType();
      renderScanLogs();

      if(!el('scanStatus').textContent.trim()) el('scanStatus').textContent = t('waitingForScan');
      if(!el('registerStatus').textContent.trim()) el('registerStatus').textContent = t('waitingForScan');
    }

    function getItems(){
      return JSON.parse(localStorage.getItem(ITEMS_KEY) || '[]');
    }

    function setItems(items){
      localStorage.setItem(ITEMS_KEY, JSON.stringify(items));
    }

    function getLogs(){
      return JSON.parse(localStorage.getItem(SCAN_LOG_KEY) || '[]');
    }

    function setLogs(logs){
      localStorage.setItem(SCAN_LOG_KEY, JSON.stringify(logs));
    }

    function saveScanLog(tagId, found){
      const logs = getLogs();
      logs.unshift({
        tagId,
        found,
        time: new Date().toLocaleString()
      });
      setLogs(logs.slice(0, 100));
    }

    function renderScanLogs(){
      const container = el('logsList');
      const logs = getLogs();

      if(!logs.length){
        container.innerHTML = `<div class="empty-text">${t('logTitleEmpty')}</div>`;
        return;
      }

      container.innerHTML = logs.map(log => {
        const stateClass = log.found ? 'status-ok' : 'status-bad';
        const stateText = log.found ? t('logFound') : t('logNotFound');
        return `
          <div class="log-item">
            <div class="log-top">
              <span class="${stateClass}">${stateText}</span>
              <span class="log-time">${log.time}</span>
            </div>
            <div>${t('logTag')}: <span class="mono">${log.tagId}</span></div>
          </div>
        `;
      }).join('');
    }

    function openScreen(screenId){
      el('homeScreen').style.display = 'none';
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      el(screenId).classList.add('active');
      clearStatuses();

      if(screenId === 'scanScreen'){
        el('scanResult').classList.remove('active');
      }
    }

    function goHome(){
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      el('homeScreen').style.display = 'flex';
      clearStatuses();
    }

    function clearStatuses(){
      el('scanStatus').textContent = t('waitingForScan');
      el('registerStatus').textContent = t('waitingForScan');
      el('saveStatus').textContent = '';
      el('passwordStatus').textContent = '';
    }

    function openPasswordScreen(){
      openScreen('passwordScreen');
      el('passwordInput').value = '';
      el('passwordStatus').textContent = '';
    }

    function checkPassword(){
      const password = String(el('passwordInput').value || '').trim();

      if(password === PASSWORD_VALUE){
        el('passwordInput').value = '';
        el('passwordStatus').textContent = '';
        openScreen('registerScreen');
        openRegisterTab('registerPane');
      } else {
        el('passwordStatus').textContent = t('passwordWrong');
      }
    }

    function openRegisterTab(tabId){
      document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      el(tabId).classList.add('active');

      if(tabId === 'registerPane'){
        el('tabRegisterBtn').classList.add('active');
      } else {
        el('tabLogsBtn').classList.add('active');
      }
    }

    function clearForm(){
      el('tagId').value = '';
      el('itemType').value = 'שאקל';
      el('description').value = '';
      el('serialNumber').value = '';
      el('wll').value = '';
      el('nextInspection').value = '';
      el('itemStatus').value = 'תקין';
      el('notes').value = '';
      selectImageByType();
      el('registerStatus').textContent = t('waitingForScan');
      el('saveStatus').textContent = '';
    }

    function selectImageByType(){
      const type = el('itemType').value || 'אחר';
      el('selectedImagePreview').src = IMAGE_LIBRARY[type] || IMAGE_LIBRARY['אחר'];
    }

    function fillScanCard(item){
      el('scanItemImage').src = item.imageSrc || IMAGE_LIBRARY[item.itemType] || IMAGE_LIBRARY['אחר'];
      el('scanItemType').textContent = translateType(item.itemType);
      el('scanTagId').textContent = item.tagId || '-';
      el('scanDescription').textContent = item.description || '-';
      el('scanSerial').textContent = item.serialNumber || '-';
      el('scanWll').textContent = item.wll || '-';
      el('scanNextInspection').textContent = item.nextInspection || '-';
      el('scanItemStatus').textContent = translateStatus(item.status);
      applyStatusColor(el('scanItemStatus'), item.status);
      el('scanNotes').textContent = item.notes || '-';
      el('scanResult').classList.add('active');
    }

    function fillRegisterForm(item){
      el('tagId').value = item.tagId || '';
      el('itemType').value = item.itemType || 'שאקל';
      el('description').value = item.description || '';
      el('serialNumber').value = item.serialNumber || '';
      el('wll').value = item.wll || '';
      el('nextInspection').value = item.nextInspection || '';
      el('itemStatus').value = item.status || 'תקין';
      el('notes').value = item.notes || '';
      selectImageByType();
    }

    function saveItem(){
      const item = {
        tagId: String(el('tagId').value || '').trim(),
        itemType: el('itemType').value,
        description: el('description').value.trim(),
        serialNumber: el('serialNumber').value.trim(),
        wll: el('wll').value.trim(),
        nextInspection: el('nextInspection').value,
        status: el('itemStatus').value,
        notes: el('notes').value.trim(),
        imageSrc: IMAGE_LIBRARY[el('itemType').value] || IMAGE_LIBRARY['אחר']
      };

      if(!item.tagId){
        el('saveStatus').textContent = t('needTag');
        return;
      }

      const items = getItems();
      const idx = items.findIndex(x => x.tagId === item.tagId);

      if(idx >= 0){
        items[idx] = item;
        el('saveStatus').textContent = t('itemUpdated');
      } else {
        items.unshift(item);
        el('saveStatus').textContent = t('itemSaved');
      }

      setItems(items);
      clearForm();
      setTimeout(() => goHome(), 700);
    }

    async function startScan(mode){
      const statusEl = mode === 'scan' ? el('scanStatus') : el('registerStatus');

      if(!('NDEFReader' in window)){
        statusEl.textContent = t('noWebNfc');
        return;
      }

      try{
        const ndef = new NDEFReader();
        await ndef.scan();
        statusEl.textContent = t('waitingForNfcTag');

        ndef.onreadingerror = () => {
          statusEl.textContent = t('scanReadError');
        };

        ndef.onreading = ({ serialNumber }) => {
          const tagId = String(serialNumber || '').trim() || 'NFC-UNKNOWN';
          const items = getItems();
          const found = items.find(x => x.tagId === tagId);

          saveScanLog(tagId, !!found);

          if(mode === 'scan'){
            if(found){
              statusEl.textContent = t('itemFound');
              fillScanCard(found);
            } else {
              el('scanResult').classList.remove('active');
              statusEl.textContent = t('itemNotFound');
            }
          } else {
            el('tagId').value = tagId;
            if(found){
              statusEl.textContent = t('existingTag');
              fillRegisterForm(found);
            } else {
              statusEl.textContent = t('newTag');
            }
          }
        };
      } catch(err){
        statusEl.textContent = t('scanStartError');
      }
    }

    el('itemType').addEventListener('change', selectImageByType);

    setLang(currentLang);
    clearStatuses();
    selectImageByType();
    renderScanLogs();
  </script>
</body>
</html>
