<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NFC Safety Demo</title>

<style>
*{box-sizing:border-box}
:root{--accent:#0f766e}
body{margin:0;font-family:Arial;background:#666}

/* FLAGS */
.lang-switch{
  position:absolute;
  top:15px;
  right:15px;
  z-index:10;
  display:flex;
  gap:10px;
}
.flag{
  font-size:22px;
  cursor:pointer;
}

/* HOME */
.home-screen{
  min-height:100vh;
  background:url('background.jpeg') center/cover no-repeat;
  display:flex;
  flex-direction:column;
  justify-content:flex-end;
  padding:24px;
  position:relative;
}

.actions{max-width:300px;margin:auto;display:flex;flex-direction:column;gap:16px}

.demo-badge-bottom{
  position:absolute;
  left:20px;
  bottom:20px;
  color:white;
  background:rgba(0,0,0,0.4);
  padding:6px 10px;
  border-radius:10px;
}

.btn{padding:18px;border:none;border-radius:15px;font-size:18px;font-weight:bold;cursor:pointer}
.btn-check{background:var(--accent);color:white}
.btn-register{background:#eee}

/* SCREENS */
.screen{display:none;min-height:100vh;padding:16px;background:#f5f5f5}
.screen.active{display:block}

.card{background:white;padding:16px;border-radius:16px;margin-bottom:12px}

input,select{width:100%;padding:12px;margin-bottom:10px}

.save-btn,.main-btn{width:100%;padding:16px;background:var(--accent);color:white;border:none;border-radius:12px}

.error{color:red}
</style>
</head>

<body>

<!-- FLAGS -->
<div class="lang-switch">
  <span class="flag" onclick="setLang('he')">🇮🇱</span>
  <span class="flag" onclick="setLang('en')">🇺🇸</span>
</div>

<!-- HOME -->
<div id="homeScreen" class="home-screen">
  <div class="actions">
    <button class="btn btn-check" id="btnCheck" onclick="openScreen('scanScreen')"></button>
    <button class="btn btn-register" id="btnRegister" onclick="openPasswordScreen()"></button>
  </div>
  <div class="demo-badge-bottom">DEMO®</div>
</div>

<!-- PASSWORD -->
<div id="passwordScreen" class="screen">
  <div class="card">
    <h2 id="passTitle"></h2>
    <label id="passLabel"></label>
    <input id="passwordInput" type="password">
    <button class="main-btn" onclick="checkPassword()" id="passBtn"></button>
    <div id="passwordError" class="error"></div>
  </div>
</div>

<!-- SCAN -->
<div id="scanScreen" class="screen">
  <button onclick="goHome()" id="back1"></button>
  <h2 id="scanTitle"></h2>
  <button onclick="startScan('scan')" id="scanBtn"></button>
  <div id="scanStatus"></div>
</div>

<!-- REGISTER -->
<div id="registerScreen" class="screen">
  <button onclick="goHome()" id="back2"></button>
  <h2 id="regTitle"></h2>

  <button onclick="startScan('register')" id="scanTagBtn"></button>
  <div id="registerStatus"></div>

  <input id="tagId" placeholder="Tag ID">
  <input id="description" placeholder="Description">
  <input id="serialNumber" placeholder="Serial Number">
  <input id="wll" placeholder="WLL">
  <input id="nextInspection" type="date">

  <select id="itemStatus">
    <option>תקין</option>
    <option>לבדיקה</option>
    <option>מושבת</option>
  </select>

  <input id="notes" placeholder="Notes">

  <button class="save-btn" onclick="saveItem()" id="saveBtn"></button>
  <div id="saveStatus"></div>
</div>

<script>

const LANG = {
  he:{
    check:"בדיקת ציוד",
    register:"קליטת ציוד",
    passwordTitle:"כניסה לקליטת ציוד",
    passwordLabel:"סיסמה (1234)",
    enter:"כניסה",
    wrong:"סיסמה שגויה",
    back:"חזרה",
    scan:"סרוק עכשיו",
    scanTitle:"בדיקת ציוד",
    regTitle:"קליטת ציוד",
    scanTag:"סרוק תג",
    save:"שמור פריט"
  },
  en:{
    check:"Equipment Check",
    register:"Register Equipment",
    passwordTitle:"Access Register",
    passwordLabel:"Password (1234)",
    enter:"Enter",
    wrong:"Wrong password",
    back:"Back",
    scan:"Scan Now",
    scanTitle:"Equipment Check",
    regTitle:"Register Equipment",
    scanTag:"Scan Tag",
    save:"Save Item"
  }
};

let currentLang = localStorage.getItem("lang") || "he";

function setLang(lang){
  currentLang = lang;
  localStorage.setItem("lang", lang);

  document.documentElement.dir = lang === "he" ? "rtl" : "ltr";

  const t = LANG[lang];

  btnCheck.textContent = t.check;
  btnRegister.textContent = t.register;
  passTitle.textContent = t.passwordTitle;
  passLabel.textContent = t.passwordLabel;
  passBtn.textContent = t.enter;
  back1.textContent = t.back;
  back2.textContent = t.back;
  scanBtn.textContent = t.scan;
  scanTitle.textContent = t.scanTitle;
  regTitle.textContent = t.regTitle;
  scanTagBtn.textContent = t.scanTag;
  saveBtn.textContent = t.save;
}

setLang(currentLang);

/* NAV */
function openScreen(id){
  homeScreen.style.display="none";
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function goHome(){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  homeScreen.style.display="flex";
}

/* PASSWORD */
function openPasswordScreen(){
  openScreen("passwordScreen");
  passwordInput.value="";
  passwordError.textContent="";
}

function checkPassword(){
  if(passwordInput.value === "1234"){
    openScreen("registerScreen");
  } else {
    passwordError.textContent = LANG[currentLang].wrong;
  }
}

/* STORAGE */
function getItems(){ return JSON.parse(localStorage.getItem("items")||"[]"); }
function setItems(items){ localStorage.setItem("items",JSON.stringify(items)); }

/* CLEAR */
function clearForm(){
  tagId.value="";
  description.value="";
  serialNumber.value="";
  wll.value="";
  nextInspection.value="";
  notes.value="";
  itemStatus.value="תקין";
}

/* SAVE */
function saveItem(){
  const item={tagId:tagId.value,description:description.value};

  if(!item.tagId){ saveStatus.textContent="Tag ID required"; return; }

  const items=getItems();
  items.unshift(item);
  setItems(items);

  saveStatus.textContent="Saved";

  clearForm();
  setTimeout(()=>goHome(),500);
}

/* NFC */
async function startScan(mode){
  const status = mode==="scan"?scanStatus:registerStatus;

  if(!("NDEFReader" in window)){ status.textContent="No NFC"; return; }

  const reader=new NDEFReader();
  await reader.scan();

  reader.onreading=e=>{
    if(mode==="register"){
      tagId.value=e.serialNumber;
    } else {
      status.textContent=e.serialNumber;
    }
  };
}

</script>
</body>
</html>
